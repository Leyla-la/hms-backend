spring.application.name=MediaMS

server.port=9400
spring.datasource.url=jdbc:mysql://localhost:3306/mediadb
spring.datasource.username=root
spring.datasource.password=Lynxvi123.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / Hibernate - schema managed manually (no Flyway)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Eureka
# Register with local Eureka Server
# (Needs Eureka-Server running on http://localhost:8761)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.instance-id=${spring.application.name}:${server.port}

# Kafka
spring.kafka.bootstrap-servers=localhost:9093

# Swagger
springdoc.api-docs.path=/media/v3/api-docs