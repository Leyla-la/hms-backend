spring.application.name=ProfileMS
server.port=9100
spring.datasource.url=jdbc:mysql://localhost:3306/profiledb
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

DOCTOR_NOT_FOUND=Doctor not found
PATIENT_NOT_FOUND=Patient not found
DOCTOR_ALREADY_EXISTS=Doctor already exists
PATIENT_ALREADY_EXISTS=Patient already exists

# Kafka
spring.kafka.bootstrap-servers=localhost:9093

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true

# Swagger
springdoc.api-docs.path=/profile/v3/api-docs
