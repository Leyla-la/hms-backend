spring.application.name=NotificationMS
server.port=8086

# Eureka
# (Needs Eureka-Server running on http://localhost:8761)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/notificationsdb
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Kafka
spring.kafka.bootstrap-servers=localhost:9093
spring.kafka.consumer.auto-offset-reset=earliest

# Logging
logging.file.name=notification.log

# Internal service-to-service secret (used by FeignSecurityInterceptor when present)
hms.internal.secret-key=SECRET

# JWT Secret (for WebSocket handshake validation)
jwt.secret=secretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecretsecret

# Email (Brevo) API key for EmailService (set your real key locally)
notification.email.brevo-apikey=${BREVO_API_KEY:YOUR_BREVO_API_KEY_HERE}
notification.email.brevo-url=https://api.brevo.com

# Swagger
springdoc.api-docs.path=/notifications/v3/api-docs

